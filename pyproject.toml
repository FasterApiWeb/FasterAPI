[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "FasterAPI"
version = "0.1.0"
description = "Faster — FastAPI speed, without the wait"
requires-python = ">=3.11"
dependencies = [
    "uvloop>=0.19.0",
    "msgspec>=0.18.0",
    "uvicorn[standard]>=0.29.0",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
