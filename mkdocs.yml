site_name: FasterAPI
site_description: High-performance ASGI web framework for Python
site_url: https://fasterapiweb.github.io/FasterAPI/
repo_url: https://github.com/FasterApiWeb/FasterAPI
repo_name: FasterApiWeb/FasterAPI
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Python 3.13 & compatibility: python-313.md
  - Tutorial (CRUD app): tutorial-crud.md
  - Migrating from FastAPI: migration-from-fastapi.md
  - Benchmarks: benchmarks.md
  - API reference: api-reference.md
  - Acknowledgments: acknowledgments.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 2
